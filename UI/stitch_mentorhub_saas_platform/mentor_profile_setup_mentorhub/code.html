<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-headline-sm, .font-headline-md, .font-headline-lg, .font-display-lg { font-family: 'Plus Jakarta Sans', sans-serif; }

        .shadow-level-2 { box-shadow: 0 4px 12px rgba(74, 52, 38, 0.08); }
    </style>

<body class="bg-surface text-on-surface antialiased flex">
<!-- Sidebar Component (Mentor Portal) -->
<!-- Suppressed for transactional/onboarding flow as per instructions -->
<!-- Top Navigation Component -->
<nav class="fixed top-0 w-full z-50 bg-surface dark:bg-surface-dim font-body-md text-body-md docked full-width h-[72px] border-b border-outline-variant flat no shadows">
<div class="flex justify-between items-center w-full px-gutter max-w-container-max mx-auto h-full">
<div class="flex items-center gap-4">
<span class="text-headline-md font-headline-md font-bold text-primary dark:text-primary-fixed">MentorHub</span>
</div>
<div class="flex items-center gap-4">
<button class="w-10 h-10 rounded-full flex items-center justify-center text-primary dark:text-primary-fixed hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined" data-icon="notifications" style="font-variation-settings: 'FILL' 0;">notifications</span>
</button>
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container-high cursor-pointer">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Professional headshot of a diverse individual, neutral background, soft lighting, suitable for a corporate avatar in a light mode SaaS application." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC2Zvm1sRXDp5Fpdhd_wNuZfGN_uxTnLMj2yHfM3DkZc92P5ysxxo3yqA06h9NKq8Ll5muSkGQYgupzNmErJpeR4TKIq0RZr9-_q9dgsARQl2aqbBjri-fnSubUAhMASxXvADUYwEVhpBdKLL7qrVyFh5IDz4QcTfDgmnw_JGewEy5lcMs4Ye3Ae76Hscv2ImBfK7zwZQmYv08QghYYoO4iZe2P4RuXCGve-j2JUmN_Tq3Qf0VA21aZDOawvIzgiqKH4GFfpVN1LPQ"/>
</div>
</div>
</div>
</nav>
<!-- Main Content Area -->
<main class="w-full min-h-screen pt-[72px] px-margin-mobile md:px-gutter pb-16 flex flex-col items-center">
<!-- Setup Wizard Header -->
<div class="w-full max-w-3xl mt-12 mb-8 text-center">
<h1 class="font-display-lg text-display-lg text-primary mb-2">Mentor Profile Setup</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Tell us about your expertise to connect with the right mentees.</p>
</div>
<!-- Wizard Progress Tracker (Bento style) -->
<div class="w-full max-w-3xl mb-8 flex gap-4">
<div class="flex-1 bg-surface-container-low rounded-lg p-4 border border-outline-variant border-primary border-b-4">
<span class="font-label-sm text-label-sm text-primary uppercase tracking-wider block mb-1">Step 1</span>
<span class="font-label-md text-label-md text-on-surface">Basic Info</span>
</div>
<div class="flex-1 bg-surface-container-lowest rounded-lg p-4 border border-outline-variant opacity-60">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block mb-1">Step 2</span>
<span class="font-label-md text-label-md text-on-surface-variant">Expertise</span>
</div>
<div class="flex-1 bg-surface-container-lowest rounded-lg p-4 border border-outline-variant opacity-60">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block mb-1">Step 3</span>
<span class="font-label-md text-label-md text-on-surface-variant">Availability</span>
</div>
</div>
<!-- Form Container -->
<div class="w-full max-w-3xl bg-surface-container-lowest border border-outline-variant rounded-xl p-8 md:p-12 shadow-level-2">
<form class="space-y-8">
<!-- Avatar Upload -->
<div class="flex flex-col items-center gap-4">
<div class="relative w-32 h-32 rounded-full border-2 border-dashed border-outline-variant bg-surface-container flex flex-col items-center justify-center cursor-pointer hover:bg-surface-container-high transition-colors overflow-hidden group">
<span class="material-symbols-outlined text-primary mb-2 text-3xl" data-icon="add_a_photo">add_a_photo</span>
<span class="font-label-sm text-label-sm text-primary">Upload</span>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant text-center">We recommend a professional headshot. <br/> JPG or PNG, max 5MB.</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Name Field -->
<div class="col-span-1 md:col-span-2 space-y-2">
<label class="font-label-md text-label-md text-on-surface block" for="fullName">Full Name</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded p-3 font-body-sm text-body-sm text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary shadow-[inset_0_1px_2px_rgba(0,0,0,0.05)] transition-shadow" id="fullName" placeholder="Jane Doe" type="text"/>
</div>
<!-- Professional Title -->
<div class="col-span-1 md:col-span-2 space-y-2">
<label class="font-label-md text-label-md text-on-surface block" for="title">Professional Title</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded p-3 font-body-sm text-body-sm text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary shadow-[inset_0_1px_2px_rgba(0,0,0,0.05)] transition-shadow" id="title" placeholder="e.g. Senior Product Designer at TechCorp" type="text"/>
</div>
<!-- Hourly Rate -->
<div class="col-span-1 space-y-2">
<label class="font-label-md text-label-md text-on-surface block" for="rate">Hourly Rate (USD)</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-sm">$</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded p-3 pl-8 font-body-sm text-body-sm text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary shadow-[inset_0_1px_2px_rgba(0,0,0,0.05)] transition-shadow" id="rate" placeholder="150" type="number"/>
</div>
</div>
<!-- Core Expertise (Dropdown simulation) -->
<div class="col-span-1 space-y-2">
<label class="font-label-md text-label-md text-on-surface block" for="expertise">Primary Discipline</label>
<select class="w-full bg-surface-container-lowest border border-outline-variant rounded p-3 font-body-sm text-body-sm text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary shadow-[inset_0_1px_2px_rgba(0,0,0,0.05)] transition-shadow appearance-none" id="expertise">
<option disabled="" selected="" value="">Select Discipline...</option>
<option value="design">Design</option>
<option value="engineering">Engineering</option>
<option value="product">Product Management</option>
<option value="marketing">Marketing</option>
</select>
</div>
<!-- Technical Stack / Skills -->
<div class="col-span-1 md:col-span-2 space-y-2">
<label class="font-label-md text-label-md text-on-surface block">Technical Stack &amp; Skills</label>
<div class="flex flex-wrap gap-2 mb-2">
<span class="inline-flex items-center gap-1 bg-surface-container px-3 py-1 rounded-full font-label-sm text-label-sm text-on-surface border border-outline-variant">
                                UI/UX Design <button class="material-symbols-outlined text-[14px] hover:text-error transition-colors" data-icon="close" type="button">close</button>
</span>
<span class="inline-flex items-center gap-1 bg-surface-container px-3 py-1 rounded-full font-label-sm text-label-sm text-on-surface border border-outline-variant">
                                Figma <button class="material-symbols-outlined text-[14px] hover:text-error transition-colors" data-icon="close" type="button">close</button>
</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded p-3 font-body-sm text-body-sm text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary shadow-[inset_0_1px_2px_rgba(0,0,0,0.05)] transition-shadow" placeholder="Type a skill and press Enter..." type="text"/>
</div>
</div>
<!-- Form Actions -->
<div class="flex justify-between items-center pt-6 mt-6 border-t border-outline-variant">
<button class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors px-4 py-2" type="button">Save as Draft</button>
<button class="bg-primary-container text-on-primary font-label-md text-label-md px-6 py-3 rounded hover:-translate-y-0.5 hover:shadow-level-2 transition-all" type="submit">Next: Expertise</button>
</div>
</form>
</div>
</main>
</body></html>
