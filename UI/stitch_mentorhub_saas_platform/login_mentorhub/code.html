<h1 class="font-headline-lg text-headline-lg text-primary mb-2">MentorHub</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to access your dashboard</p>
</div>
<!-- Login Card -->
<div class="bg-surface rounded-xl border border-outline-variant shadow-soft p-8 w-full backdrop-blur-sm bg-opacity-95">
<form class="space-y-6" id="loginForm">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="mail">mail</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-sm text-body-sm text-on-surface placeholder:text-outline shadow-[inset_0_1px_2px_rgba(0,0,0,0.02)]" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="lock">lock</span>
</div>
<input class="w-full pl-10 pr-10 py-3 bg-surface-container-lowest border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-sm text-body-sm text-on-surface placeholder:text-outline shadow-[inset_0_1px_2px_rgba(0,0,0,0.02)]" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded bg-surface-container-lowest cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember-me">
                        Remember me for 30 days
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded bg-primary-container hover:bg-primary text-on-primary font-label-md text-label-md transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary relative overflow-hidden group" id="submitBtn" type="submit">
<span class="btn-text">Sign In</span>
<div class="loader-container absolute inset-0 flex items-center justify-center opacity-0 transition-opacity bg-primary-container group-hover:bg-primary">
<div class="loader"></div>
</div>
</button>
</form>
<!-- Footer Links -->
<div class="mt-8 pt-6 border-t border-surface-variant text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors ml-1" href="#">Request Access</a>
</p>
</div>
</div>
</div>
<script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = btn.querySelector('.btn-text');
            const loaderContainer = btn.querySelector('.loader-container');
            
            // Show loading state
            btnText.style.opacity = '0';
            loaderContainer.style.opacity = '1';
